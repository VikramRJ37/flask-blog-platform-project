<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container-fluid">
    <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
      <div class="navbar-nav">
        <a class="nav-link" aria-current="page" href="{{url_for('core.index')}}">HOME</a>
        <a class="nav-link" aria-current="page" href="{{url_for('core.info')}}">INFO</a>
        {% if current_user.is_authenticated %}
        <a class="nav-link" aria-current="page" href="{{url_for('users.logout')}}">LOG_OUT</a>
        <a class="nav-link" aria-current="page" href="{{url_for('users.account')}}">ACCOUNT</a>
        <a class="nav-link" aria-current="page" href="{{url_for('blog_posts.create_post')}}">CREATE_POST</a>
        {% else %}
        <a class="nav-link" aria-current="page" href="{{url_for('users.login')}}">LOGIN</a>
        <a class="nav-link" aria-current="page" href="{{url_for('users.register')}}">REGISTER</a>
        {% endif %}
      </div>
    </div>
  </div>
</nav>
<div class="container">
    {% block content %}

    {% endblock %}
</div>
</body>
</html>
